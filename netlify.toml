[build]
  command = "npm run build"
  publish = "dist"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.environment]
  # Netlify Secret Scanning configuration
  # These variables are being flagged as secrets because their values match site content (brand name/repo name).
  # We omit them from the scan to allow the build to pass.
  SECRETS_SCAN_OMIT_KEYS = "VITE_GITHUB_REPO,VITE_GITHUB_OWNER,VITE_GITHUB_TOKEN,VITE_ADMIN_PASSWORD"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
