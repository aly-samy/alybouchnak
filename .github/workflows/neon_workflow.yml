name: Create/Delete Branch for Pull Request

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch-name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch-name
        uses: tj-actions/branch-names@v8
  
  create-branch:
    name: Create Neon Branch
    if: github.event.action != 'closed' && secrets.NEON_API_KEY != '' && secrets.NEON_PROJECT_ID != ''
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.create-branch.outputs.db_url }}
      host: ${{ steps.create-branch.outputs.host }}
    steps:
      - name: Create branch
        id: create-branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          # parent_branch: main
          branch_name: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete-branch:
    name: Delete Neon Branch
    if: github.event.action == 'closed' && secrets.NEON_API_KEY != '' && secrets.NEON_PROJECT_ID != ''
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}-${{ needs.setup.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
